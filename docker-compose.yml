services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./backend/AppApi
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENV:-Production}
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=StarterDB;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=true;MultipleActiveResultSets=true
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=AppApi
      - JwtSettings__Audience=StarterClient
      - Cors__AllowedOrigins__0=${FRONTEND_ORIGIN:-http://localhost:5173}
      - AdminSettings__Email=${ADMIN_EMAIL:-admin@starter.com}
      - AdminSettings__UserName=${ADMIN_USER:-admin}
      - AdminSettings__Password=${ADMIN_PASSWORD}
    depends_on:
      sqlserver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/starter-ui
      dockerfile: Dockerfile
    ports:
      - "5173:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlserver_data:
